name: Deploy Bot

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

env:
  YC_FOLDER_ID: b1g7scs6lgrf9ijk4dff
  YC_REGISTRY: crpdhn2sdv42n950jo8l
  BOT_IMAGE: cr.yandex/crpdhn2sdv42n950jo8l/youtwoy
  CONTAINER_ID: bbaph33gp6gjmcq62tqi
  LOCKBOX_SECRET_ID: e6qknf8t938ldnctsl3j
  CONTAINER_HOST: bbaph33gp6gjmcq62tqi.containers.yandexcloud.net

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m compileall app

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: syntax-check
    outputs:
      previous_revision_id: ${{ steps.deploy-step.outputs.revision_id }}

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          printf '%s' "$YC_SA_KEY_JSON" | docker login \
            --username json_key \
            --password-stdin \
            cr.yandex

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.BOT_IMAGE }}:${{ github.sha }},${{ env.BOT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Yandex Serverless Container
        id: deploy-step
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          export PATH="$HOME/yandex-cloud/bin:$PATH"

          echo '${{ secrets.YC_SA_KEY_JSON }}' > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id ${{ env.YC_FOLDER_ID }}

          PREV_REVISION=$(yc serverless container revision list \
            --container-id ${{ env.CONTAINER_ID }} \
            --limit 1 \
            --format json | python3 -c "import sys,json; revs=json.load(sys.stdin); print(revs[0]['id'] if revs else '')" 2>/dev/null || echo "")
          echo "revision_id=$PREV_REVISION" >> "$GITHUB_OUTPUT"

          yc serverless container revision deploy \
            --container-id ${{ env.CONTAINER_ID }} \
            --image ${{ env.BOT_IMAGE }}:${{ github.sha }} \
            --cores 1 \
            --memory 512MB \
            --concurrency 4 \
            --execution-timeout 120s \
            --service-account-id ${{ secrets.YC_SA_ID }} \
            --secret environment-variable=BOT_TOKEN,id=${{ env.LOCKBOX_SECRET_ID }},key=token \
            --secret environment-variable=WEBHOOK_SECRET,id=${{ env.LOCKBOX_SECRET_ID }},key=webhook-secret

          rm -f /tmp/sa-key.json

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for container health
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.CONTAINER_HOST }}/")
            if [ "$status" = "200" ]; then echo "Bot is up"; exit 0; fi
            echo "Attempt $i: status=$status, retrying in 3s..."
            sleep 3
          done
          echo "Bot did not become healthy in time"
          exit 1

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always() && needs.smoke-test.result == 'failure'
    steps:
      - name: Rollback to previous revision
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          export PATH="$HOME/yandex-cloud/bin:$PATH"
          echo '${{ secrets.YC_SA_KEY_JSON }}' > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id ${{ env.YC_FOLDER_ID }}

          PREV_REVISION="${{ needs.deploy.outputs.previous_revision_id }}"
          if [ -z "$PREV_REVISION" ]; then
            echo "No previous revision, skipping rollback"
            exit 0
          fi
          yc serverless container rollback \
            --id ${{ env.CONTAINER_ID }} \
            --revision-id "$PREV_REVISION"

          rm -f /tmp/sa-key.json
